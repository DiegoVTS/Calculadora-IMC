<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Calculadora IMC">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Roboto+Mono:ital,wght@0,100..700;1,100..700&family=Roboto:ital,wght@0,100..900;1,100..900&family=Titan+One&display=swap" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Roboto+Mono:ital,wght@0,100..700;1,100..700&family=Roboto:ital,wght@0,100..900;1,100..900&family=Titan+One&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="src/style.css">
    <link rel="shortcut icon" href="img/favicon.ico" type="image/x-icon">
    <title>Calculadora IMC</title>
</head>
<body>
    <header id="cabecalho">
        <h1>Calculadora IMC</h1>
    </header>
    <main id="conteudo">
        <div id="grid">
            <section id="valores">
                <h2>Valores</h2>
                <form action="" id="form-val">
                    <label for="peso">Peso em Kg</label>
                    <input type="number" step="0.01" name="peso" id="peso" placeholder="Digite Seu Peso: 86.66">
                    <label for="altura">Altura em Cm</label>
                    <input type="number" step="0.01" name="altura" id="altura" placeholder="Digite Sua Altura: 185">
                    <p id="erro" hidden>Por favor, preencha todos os campos corretamente.</p>
                    <button type="submit" id="btn">Calcular IMC</button>
                </form>
            </section>

            <section id="resultados">
                <h2>Resultado</h2>
                <h3 id="resultado-imc">--</h3>
                <p id="classificacao">--</p>

                <div id="velocimetro">
                    <svg viewBox="-25 -10 250 140" width="100%">
                        <!-- centro: 100,100 raio: 90 -->
                        
                        <!-- azul: -180° a -135° -->
                        <path d="M 10 100 A 90 90 0 0 1 36.3 36.3" fill="none" stroke="#42A5F5" stroke-width="16" stroke-linecap="butt"/>
                        
                        <!-- verde: -135° a -90° -->
                        <path d="M 36.3 36.3 A 90 90 0 0 1 100 10" fill="none" stroke="#66BB6A" stroke-width="16" stroke-linecap="butt"/>
                        
                        <!-- laranja: -90° a -45° -->
                        <path d="M 100 10 A 90 90 0 0 1 163.7 36.3" fill="none" stroke="#FFA726" stroke-width="16" stroke-linecap="butt"/>
                        
                        <!-- vermelho: -45° a 0° -->
                        <path d="M 163.7 36.3 A 90 90 0 0 1 190 100" fill="none" stroke="#EF5350" stroke-width="16" stroke-linecap="butt"/>

                                                <!-- números -->
                        <text x="10" y="98" font-size="7" fill="#333" font-weight="600" text-anchor="middle">10</text>
                        <text x="100" y="12" font-size="7" fill="#333" font-weight="600" text-anchor="middle">25</text>
                        <text x="190" y="98" font-size="7" fill="#333" font-weight="600" text-anchor="middle">40+</text>

                        <line id="ponteiro" x1="100" y1="100" x2="100" y2="20" stroke="#333" stroke-width="3" stroke-linecap="round"/>
                        <circle cx="100" cy="100" r="5" fill="#333"/>
                    </svg>
                    <div id="legenda">
                        <span><span class="cor" style="background:#42A5F5"></span> Abaixo do peso</span>
                        <span><span class="cor" style="background:#66BB6A"></span> Peso normal</span>
                        <span><span class="cor" style="background:#FFA726"></span> Sobrepeso</span>
                        <span><span class="cor" style="background:#EF5350"></span> Obesidade</span>
                    </div>
                </div>
            </section>
        </div>

    </main>
    <footer id="rodape">
        <p></p>
    </footer>

    <script src="src/index.js"></script>
</body>
</html>
